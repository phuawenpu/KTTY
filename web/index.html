<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="KTTY — secure mobile terminal">

  <!--
    Strict Content Security Policy. We need 'wasm-unsafe-eval' for the
    wasm-bindgen module loader, but everything else is locked down to
    same-origin to keep third-party scripts (extensions, bookmarklets, XSS)
    from reaching the crypto module on `window`. `connect-src` lets the
    Flutter client open the WSS connection to the relay.
  -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' 'wasm-unsafe-eval';
    style-src 'self' 'unsafe-inline';
    img-src 'self' data:;
    font-src 'self';
    connect-src 'self' wss://ktty-relay.fly.dev wss://*.fly.dev;
    object-src 'none';
    base-uri 'self';
    frame-ancestors 'none';
    form-action 'none';
  ">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="Referrer-Policy" content="no-referrer">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="ktty">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>ktty</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script type="module">
    // Load WASM crypto before Flutter so it's available at startup. The
    // module is exposed on window._kttyCrypto only briefly so the Flutter
    // engine's JS interop can find it; once Flutter has booted we drop the
    // global so third-party scripts can't reach it.
    import init, * as crypto from './wasm/ktty_wasm_crypto.js';
    (async () => {
      try {
        await init();
        // Wrap the module so we can null it out later without affecting the
        // copy Flutter still holds via its bound externs.
        window._kttyCrypto = Object.freeze({
          deriveKey: crypto.deriveKey,
          roomId: crypto.roomId,
          encrypt: crypto.encrypt,
          decrypt: crypto.decrypt,
          mlkemEncapsulate: crypto.mlkemEncapsulate,
          computeHmac: crypto.computeHmac,
          verifyHmac: crypto.verifyHmac,
        });
        window._kttyCryptoReady = true;
        console.log('[KTTY] WASM crypto loaded');
      } catch (e) {
        window._kttyCryptoReady = false;
        console.error('[KTTY] WASM crypto failed:', e);
      }
    })();
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
