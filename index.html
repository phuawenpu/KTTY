<!DOCTYPE html>
<html>
<head>
  <base href="/KTTY/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="KTTY — secure mobile terminal">

  <!--
    Content Security Policy.

    - 'wasm-unsafe-eval' is required for both wasm-bindgen (the KTTY crypto)
      and Flutter web's canvaskit renderer.
    - https://www.gstatic.com is required because Flutter web's canvaskit
      renderer dynamically imports canvaskit.js and fetches canvaskit.wasm
      from https://www.gstatic.com/flutter-canvaskit/<engineRevision>/. If
      you remove gstatic.com from script-src or connect-src the PWA will
      fail to render. (Bundle canvaskit locally and you can drop the
      whitelist.)
    - https://fonts.gstatic.com is for Material/Cupertino fallback fonts.
    - connect-src for the relay covers wss://ktty-relay.fly.dev and any
      other *.fly.dev relay you deploy.
    - 'unsafe-inline' for style-src is required by Flutter's runtime CSS
      injection. This is the only major relaxation.
    - frame-ancestors 'none' stops the PWA being embedded in an iframe
      (clickjacking).
  -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' 'wasm-unsafe-eval' https://www.gstatic.com;
    style-src 'self' 'unsafe-inline';
    img-src 'self' data: blob:;
    font-src 'self' https://fonts.gstatic.com;
    connect-src 'self' https://www.gstatic.com https://fonts.gstatic.com wss://ktty-relay.fly.dev wss://*.fly.dev;
    worker-src 'self' blob:;
    object-src 'none';
    base-uri 'self';
    frame-ancestors 'none';
    form-action 'none';
  ">
  <meta http-equiv="X-Content-Type-Options" content="nosniff">
  <meta http-equiv="Referrer-Policy" content="no-referrer">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="ktty">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>ktty</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script type="module">
    // Load WASM crypto BEFORE flutter_bootstrap.js. The top-level `await`
    // here is what makes that ordering work — module scripts that use
    // top-level await block any subsequent <script> tag from executing,
    // so flutter_bootstrap.js doesn't run until window._kttyCrypto is
    // ready. Without this, Flutter's main.dart can call NativeCrypto
    // before the WASM module has finished initialising and the
    // resulting handshake produces a wrong key (looks like "wrong PIN"
    // to the user).
    import init, * as crypto from './wasm/ktty_wasm_crypto.js';
    try {
      await init();
      // Assign the module namespace object directly. Don't try to copy
      // the function references onto a wrapper object — the wasm-bindgen
      // exports rely on the module-namespace identity, and a copied
      // wrapper can produce subtly wrong results that look like a key
      // mismatch. The CSP above is the real defence-in-depth for
      // unwanted access to this global.
      window._kttyCrypto = crypto;
      window._kttyCryptoReady = true;
      console.log('[KTTY] WASM crypto loaded');
    } catch (e) {
      window._kttyCryptoReady = false;
      console.error('[KTTY] WASM crypto failed:', e);
    }
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
